services:
  db:
    image: postgres:15-alpine
    container_name: informaperu-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-informaperu}
      POSTGRES_USER: ${POSTGRES_USER:-informaperu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-informaperu}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-informaperu}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: informaperu-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-informaperu}:${POSTGRES_PASSWORD:-informaperu}@db:5432/${POSTGRES_DB:-informaperu}}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
    ports:
      - "8080:8000"

  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: informaperu-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@informaperu.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
    ports:
      - "5050:80"

volumes:
  postgres_data:

