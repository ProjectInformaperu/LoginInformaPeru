services:
  - type: web
    name: informaperu-backend
    env: docker
    plan: free
    region: oregon
    repo: https://github.com/InformaPeru-com/loginInformaPeru.git
    branch: master
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: informaperu-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: BACKEND_PORT
        value: "8000"
      - key: BACKEND_CORS_ORIGINS
        value: http://localhost:5173,https://informaperu.com,https://www.informaperu.com

databases:
  - name: informaperu-db
    plan: free